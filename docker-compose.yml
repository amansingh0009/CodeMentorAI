version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: cm_ai_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: codementor
    ports:
      - 3306:3306
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: cm_ai_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - 8080:8080
    depends_on:
      - mysql
    volumes:
      - ./backend/src/main/resources:/app/src/main/resources

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: cm_ai_frontend
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      - PORT=3000
      - REACT_APP_API_BASE_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  mysql-data:
